name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Embed OAuth client for Drive (from secret, if present)
        shell: bash
        env:
          ROSU_OAUTH_CLIENT_JSON: ${{ secrets.ROSU_OAUTH_CLIENT_JSON }}
        run: |
          if [ -n "$ROSU_OAUTH_CLIENT_JSON" ]; then
            printf '%s' "$ROSU_OAUTH_CLIENT_JSON" > rosu/drive/oauth_client.json
            echo "Embedded OAuth client ($(wc -c < rosu/drive/oauth_client.json) bytes)."
          else
            echo "No ROSU_OAUTH_CLIENT_JSON secret — building without an embedded Drive client."
          fi
      - name: Build single .exe
        run: pyinstaller rosu.spec
      - name: Smoke-test the frozen build
        run: dist/rosu.exe --selftest
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rosu-windows
          path: dist/rosu.exe
      - name: Rename asset for release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: cp dist/rosu.exe "dist/rosu-${GITHUB_REF_NAME}-win64.exe"
      - name: Checksum the release exe (SHA-256)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          cd dist
          sha256sum "rosu-${GITHUB_REF_NAME}-win64.exe" > "rosu-${GITHUB_REF_NAME}-win64.exe.sha256"
          cat "rosu-${GITHUB_REF_NAME}-win64.exe.sha256"
      - name: Attach exe to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rosu-${{ github.ref_name }}-win64.exe
            dist/rosu-${{ github.ref_name }}-win64.exe.sha256

  # macOS build is intentionally deferred (see README "Roadmap").
  # Enable it later by adding a macos-latest job that runs the same steps and
  # packages a .app/.dmg with PyInstaller.
